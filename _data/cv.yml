cv:
  name: Yue-Hong Chen
  label: Ph.D. Candidate in Astronomy
  email: yh_chen@smail.nju.edu.cn
  location: Nanjing, China / Potsdam, Germany
  image: ""
  summary: >
    My research bridges solar and stellar physics. Starting from observational
    studies of solar eruptive activity, I have extended my work to high-resolution
    magnetohydrodynamic (MHD) simulations of Sun-like stars, covering the full
    chain from stellar coronae and winds to coronal mass ejections and the
    associated energetic-particle events.

